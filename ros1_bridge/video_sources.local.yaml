rtsp:
  public_host: 127.0.0.1
  publish_host: 127.0.0.1
  port: 8554
  server: mediamtx
  transport: tcp

direct_sources:
  - camera_id: 0
    source_id: paw_realsense
    slot_hint: 0
    name: Paw RealSense
    runner: ffmpeg
    device: /dev/paw_realsense
    input_format: MJPEG
    input_width: 1280
    input_height: 720
    width: 960
    height: 720
    fps: 30
    codec: h264
    bitrate_kbps: 2500
    vf: crop=960:720:160:0
    rtsp_path: paw_realsense
    enabled: true

